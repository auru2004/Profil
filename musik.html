<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Musik — Ivan CNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Syne:wght@400;700;800&family=Klee+One&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#1a1209;--paper:#f5efe6;--gold:#c9a84c;--muted:#7a6a52;--purple:#6a4c93;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0804;color:#f5efe6;font-family:'Syne',sans-serif;min-height:100vh;}
    nav{padding:1.5rem 2rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid rgba(201,168,76,0.1);}
    nav a{color:var(--muted);text-decoration:none;font-size:0.8rem;letter-spacing:0.2em;transition:color 0.2s;}
    nav a:hover{color:var(--gold);}
    .page-hero{padding:5rem 2rem 3rem;text-align:center;}
    .page-jp{font-family:'Noto Serif JP',serif;font-size:0.75rem;letter-spacing:0.5em;color:var(--muted);margin-bottom:0.5rem;}
    .page-icon{font-size:4rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px #6a4c93);}
    h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;background:linear-gradient(135deg,#f5efe6,#a07bc4,#f5efe6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .content{max-width:1000px;margin:0 auto;padding:2rem;}
    .section-title { font-size: 1.8rem; color: var(--gold); margin: 3rem 0 1.5rem; border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
    
    .song-list { display: flex; flex-direction: column; gap: 1rem; }
    .song-item { display: flex; justify-content: space-between; align-items: center; background: rgba(106,76,147,0.05); border: 1px solid rgba(106,76,147,0.2); padding: 1rem 1.5rem; border-radius: 12px; transition: all 0.3s ease; flex-wrap: wrap; gap: 1rem; }
    .song-item:hover { background: rgba(106,76,147,0.15); border-color: rgba(106,76,147,0.4); transform: translateX(8px); box-shadow: -5px 5px 15px rgba(0,0,0,0.3); }
    .song-title { font-size: 1.1rem; font-weight: 600; color: #e6ddeb; display: flex; align-items: center; gap: 1rem; flex-grow: 1; }
    .song-title::before { content: '🎵'; font-size: 1.2rem; filter: hue-rotate(250deg); }
    .song-item audio { height: 40px; outline: none; border-radius: 20px; flex-shrink: 0; min-width: 250px; }
    .song-item audio::-webkit-media-controls-panel { background-color: rgba(245,239,230,0.9); }
    
    .singer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 3rem; text-align: center; padding: 1rem 0; }
    .singer-card { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .singer-card:hover { transform: translateY(-10px); }
    .singer-img-wrapper { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 3px solid rgba(106,76,147,0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: all 0.4s ease; }
    .singer-card:hover .singer-img-wrapper { border-color: var(--gold); box-shadow: 0 15px 25px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.3); }
    .singer-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; filter: brightness(0.9) contrast(1.1); }
    .singer-card:hover .singer-img { transform: scale(1.1); filter: brightness(1.1) contrast(1.1); }
    .singer-name { font-size: 1.2rem; font-weight: 700; color: #f5efe6; letter-spacing: 0.05em; transition: color 0.3s; }
    .singer-card:hover .singer-name { color: var(--gold); }
    
    @media (max-width: 600px) {
      .song-item { flex-direction: column; align-items: flex-start; }
      .song-item audio { width: 100%; min-width: unset; }
    }
    
    footer{text-align:center;padding:4rem 2rem 3rem;color:var(--muted);font-size:0.75rem;letter-spacing:0.3em;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html">←</a>
    <a href="index.html">Home</a>
    <a href="buku.html">Buku</a>
    <a href="film.html">Film</a>
    <a href="anime.html">Anime</a>
    <a href="game.html">Game</a>
    <a href="projek.html">Projek</a>
  </nav>
  <div class="page-hero">
    <div class="page-jp">音楽 · MUSIC</div>
    <div class="page-icon">🎧</div>
    <h1>Musik</h1>
  </div>
  <div class="content">
    
    <h2 class="section-title"><span>📻</span> Playlist Favorit</h2>
    <div class="song-list" id="song-list">
      <!-- Generated by JS -->
    </div>

    <h2 class="section-title"><span>🎤</span> Penyanyi Favorit</h2>
    <div class="singer-grid" id="singer-grid">
      <!-- Generated by JS -->
    </div>

  </div>
  <footer>音楽 · Melodi yang Mewarnai Hari</footer>

  <script>
    // Daftar Lagu
    const songs = [
      "Ari Lasso - Cinta Terakhir.mp3",
      "Bling-Bang-Bang-Born.mp3",
      "Butter-Fly.mp3",
      "Chiisana Koi no Uta.mp3",
      "Dangerholic.mp3",
      "Endless Tears.mp3",
      "Sunset di Tanah Anarki.mp3",
      "Unholy - Sam Smith┃Japanese Version┃Feat. Ali Orok.mp3",
      "双葉.mp3",
      "葡萄踏みの唄 (Special Version).mp3"
    ];

    // Daftar Penyanyi
    const singers = [
      "Aimyon.jpg",
      "Billie Eilish.jpg",
      "Iwan Fals.jpeg",
      "Tipe-X.jpg"
    ];

    // Render Lagu
    const songContainer = document.getElementById('song-list');
    if (songs.length > 0) {
      songs.forEach(file => {
        const title = file.substring(0, file.lastIndexOf('.'));
        const html = `
          <div class="song-item">
            <div class="song-title">${title}</div>
            <audio controls src="musik/${file}"></audio>
          </div>
        `;
        songContainer.innerHTML += html;
      });
    }

    // Render Penyanyi
    const singerContainer = document.getElementById('singer-grid');
    if (singers.length > 0) {
      singers.forEach(file => {
        const name = file.substring(0, file.lastIndexOf('.'));
        const html = `
          <div class="singer-card">
            <div class="singer-img-wrapper">
              <img src="musik/Penyanyi/${file}" alt="${name}" class="singer-img">
            </div>
            <div class="singer-name">${name}</div>
          </div>
        `;
        singerContainer.innerHTML += html;
      });
    }
  </script>
</body>
</html>
