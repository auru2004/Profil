<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime — Ivan CNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Syne:wght@400;700;800&family=Klee+One&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#c9a84c;--muted:#7a6a52;--sakura:#e8b4bc;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0804;color:#f5efe6;font-family:'Syne',sans-serif;min-height:100vh;}
    nav{padding:1.5rem 2rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid rgba(201,168,76,0.1);}
    nav a{color:var(--muted);text-decoration:none;font-size:0.8rem;letter-spacing:0.2em;transition:color 0.2s;}
    nav a:hover{color:var(--gold);}
    .page-hero{padding:5rem 2rem 3rem;text-align:center;}
    .page-jp{font-family:'Noto Serif JP',serif;font-size:0.75rem;letter-spacing:0.5em;color:var(--muted);margin-bottom:0.5rem;}
    .page-icon{font-size:4rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px #e8b4bc);}
    h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;background:linear-gradient(135deg,#f5efe6,#e8b4bc,#f5efe6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .content{max-width:900px;margin:0 auto;padding:2rem;}
    .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 3rem; padding: 2rem 0; perspective: 1200px; }
    .anime-card { position: relative; background: rgba(20, 25, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; overflow: hidden; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; flex-direction: column; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); aspect-ratio: 2/3; }
    .anime-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px -5px rgba(0,0,0,0.7), 0 0 25px rgba(232,180,188,0.4), inset 0 0 0 1px rgba(201,168,76,0.2); border-color: transparent; }
    .anime-cover { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease, filter 0.8s ease; filter: brightness(0.85) contrast(1.1); }
    .anime-card:hover .anime-cover { transform: scale(1.08); filter: brightness(1.1) contrast(1.1); }
    .anime-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10, 8, 4, 0.95) 0%, rgba(10, 8, 4, 0.2) 50%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; opacity: 1; transition: opacity 0.4s ease; z-index: 1; }
    .anime-card:hover .anime-overlay { background: linear-gradient(to top, rgba(232, 180, 188, 0.9) 0%, rgba(10, 8, 4, 0.4) 60%, transparent 100%); }
    .anime-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; color: rgba(245,239,230,0.95); line-height: 1.3; text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: color 0.3s; margin-bottom: 0.5rem; text-transform: capitalize; }
    .anime-card:hover .anime-title { color: var(--gold); }
    .anime-rating { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'Klee One', cursive; font-size: 0.9rem; color: var(--gold); font-weight: bold; background: rgba(0,0,0,0.5); padding: 0.3rem 0.6rem; border-radius: 4px; backdrop-filter: blur(5px); border: 1px solid rgba(201,168,76,0.3); width: fit-content; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    .anime-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-25deg); transition: left 0.7s ease; z-index: 2; pointer-events: none; }
    .anime-card:hover::before { left: 200%; }
    footer{text-align:center;padding:3rem;color:var(--muted);font-size:0.75rem;letter-spacing:0.3em;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html">←</a>
    <a href="index.html">Home</a>
    <a href="buku.html">Buku</a>
    <a href="musik.html">Musik</a>
    <a href="film.html">Film</a>
    <a href="game.html">Game</a>
    <a href="projek.html">Projek</a>
  </nav>
  <div class="page-hero">
    <div class="page-jp">アニメ · ANIME</div>
    <div class="page-icon">🌸</div>
    <h1>Anime</h1>
  </div>
  <div class="content">
    <div class="anime-grid" id="anime-grid">
      <!-- Generated by JS -->
    </div>
  </div>
  <footer>アニメ · Menyelami Keajaiban Animasi</footer>

  <script>
    // DAFTAR NAMA FILE ANIME (Contoh format: "Judul_Rating.jpg")
const animes = [
  "Ansatsu Kyōshitsu_8,9.jpg",
  "Classroom of the Elite_8.jpg",
  "Frieren Beyond Journey's End_9,2.jpg",
  "Inuyasha_8,6.jpg",
  "Kage no Jitsuryokusha ni Naritakute!_7,1.jpg",
  "Kimetsu No Yaiba To the Swordsmith Village_8,4.jpg",
  "Kimetsu no Yaiba Infinity Castle_8,7.jpg",
  "Kimetsu no Yaiba Mugen Ressha-hen_8,8.jpg",
  "Kimetsu no Yaiba_8,2.jpg",
  "Lookback_10.jpg",
  "Nageki no Bourei wa Intai Shitai 2_8,4.jpg",
  "Nageki no Bourei wa Intai Shitai_8,4.jpg",
  "one piece fan letter_9.jpg",
  "Seihantai na Kimi to Boku_8,8.jpg",
  "Shuumatsu no Valkyrie 2_7,6.jpg",
  "Shuumatsu no Valkyrie 3_7,6.jpg",
  "Shuumatsu no Valkyrie_7,6.jpg",
  "The Angel Next Door Spoils Me Rotte_8.jpg",
  "Weathering with You_9,2.jpg",
  "kimetsu no yaiba entertainment district arc_8,5.jpg"
];

    const grid = document.getElementById('anime-grid');
    if(animes.length > 0) {
      animes.forEach(file => {
        const base = file.substring(0, file.lastIndexOf('.'));
        const parts = base.split('_');
        const title = parts[0];
        const rating = parts[1] ? parts[1] : '?';

        const html = `
          <div class="anime-card">
            <img src="anime/${file}" alt="${title}" class="anime-cover">
            <div class="anime-overlay">
              <div class="anime-title">${title}</div>
              <div class="anime-rating">★ ${rating}/10</div>
            </div>
          </div>
        `;
        grid.innerHTML += html;
      });
    } else {
      grid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: var(--sakura);">Belum ada anime yang ditambahkan.</p>';
    }
  </script>
</body>
</html>
