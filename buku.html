<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buku — Ivan CNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Syne:wght@400;700;800&family=Klee+One&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#1a1209;--paper:#f5efe6;--red:#c0392b;--gold:#c9a84c;--muted:#7a6a52;--accent:#2c4a6e;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0804;color:#f5efe6;font-family:'Syne',sans-serif;min-height:100vh;}
    nav{padding:1.5rem 2rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid rgba(201,168,76,0.1);}
    nav a{color:var(--muted);text-decoration:none;font-size:0.8rem;letter-spacing:0.2em;transition:color 0.2s;}
    nav a:hover{color:var(--gold);}
    nav .back{font-size:1.2rem;}
    .page-hero{padding:5rem 2rem 3rem;text-align:center;position:relative;}
    .page-icon{font-size:4rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px #2c4a6e);}
    .page-jp{font-family:'Noto Serif JP',serif;font-size:0.75rem;letter-spacing:0.5em;color:var(--muted);margin-bottom:0.5rem;}
    h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;background:linear-gradient(135deg,#f5efe6,var(--accent),#f5efe6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .content{max-width:900px;margin:0 auto;padding:2rem;}
    .placeholder-card{background:rgba(44,74,110,0.08);border:1px solid rgba(44,74,110,0.2);border-radius:2px;padding:3rem;text-align:center;}
    .placeholder-card p{font-family:'Klee One',cursive;color:rgba(245,239,230,0.6);line-height:1.8;}
    .tag{display:inline-block;background:rgba(44,74,110,0.2);border:1px solid rgba(44,74,110,0.4);padding:0.2rem 0.8rem;border-radius:2px;font-size:0.7rem;letter-spacing:0.2em;color:#7ba7d6;margin:0.3rem;}
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 3rem; padding: 2rem 0; perspective: 1200px; }
    .book-card { position: relative; background: rgba(20, 25, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; overflow: hidden; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; flex-direction: column; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
    .book-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px -5px rgba(0,0,0,0.7), 0 0 25px rgba(44,74,110,0.4), inset 0 0 0 1px rgba(201,168,76,0.2); border-color: transparent; }
    .book-cover { width: 100%; height: 320px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05); transition: transform 0.8s ease, filter 0.8s ease; filter: brightness(0.9) contrast(1.1); }
    .book-card:hover .book-cover { transform: scale(1.08); filter: brightness(1.1) contrast(1.1); }
    .book-info { padding: 1.5rem 1rem; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(10, 8, 4, 0), rgba(10, 8, 4, 0.9)); position: relative; z-index: 1; }
    .book-title { font-family: 'Klee One', cursive; font-size: 1.15rem; font-weight: bold; color: rgba(245,239,230,0.9); line-height: 1.4; text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: color 0.3s; text-transform: capitalize; }
    .book-card:hover .book-title { color: var(--gold); }
    .book-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-25deg); transition: left 0.7s ease; z-index: 2; pointer-events: none; }
    .book-card:hover::before { left: 200%; }
    footer{text-align:center;padding:3rem;color:var(--muted);font-size:0.75rem;letter-spacing:0.3em;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="back">←</a>
    <a href="index.html">Home</a>
    <a href="musik.html">Musik</a>
    <a href="film.html">Film</a>
    <a href="anime.html">Anime</a>
    <a href="game.html">Game</a>
    <a href="projek.html">Projek</a>
    <a href="penulisan.html">Penulisan</a>
  </nav>
  <div class="page-hero">
    <div class="page-jp">本 · BOOKS</div>
    <div class="page-icon">📚</div>
    <h1>Buku</h1>
  </div>
  <div class="content">
    <div class="book-grid" id="book-grid">
      <!-- Generated by JS -->
    </div>
  </div>
  <footer>本 · Jelajahi Dunia Lewat Kata</footer>

  <script>
    // DAFTAR NAMA FILE BUKU
    const books = [
      "48 Laws Of Power.jpg",
      "A Christmas Carol.jpg",
      "Animal Farm.jpg",
      "Art Girl Setsuko Negishi Dan Kawan-kawannya.jpg",
      "Children of Blood and Bone.jpg",
      "Di Tanah Lada.jpg",
      "Gaya hidup agak laen ala Stoik.png",
      "Girls in the dark.jpg",
      "Hari ini aku datang kembali ke toko buku kobayashi.jpg",
      "Hidup Seperti Kucing.jpg",
      "Hujan.png",
      "Insecurity.jpg",
      "Loneliness.jpg",
      "Misteri Kereta Api Biru.jpg",
      "My Faith My Adventure.jpg",
      "Omoiyari.jpg",
      "Penyihir Terakhir Puerro Series.jpg",
      "Robinson Crusoe.jpg",
      "Santai Aja, Namanya Juga Hidup.jpg",
      "Sendiri.jpg",
      "Tenki No Ko.jfif",
      "The Everlasting Andante.jfif",
      "Ther Melian Reminiscence.jpg",
      "Ther Melin Anthology.jfif",
      "Welcome to the hyunam-dong bookshop.jpg",
      "bulan.jpg",
      "bumi.jpg",
      "matahari.jpg"
    ];

    const grid = document.getElementById('book-grid');
    if(books.length > 0) {
      books.forEach(file => {
        const title = file.substring(0, file.lastIndexOf('.')) || file;
        const html = `
          <div class="book-card">
            <img src="coverbuku/${file}" alt="${title}" class="book-cover">
            <div class="book-info">
              <div class="book-title">${title}</div>
            </div>
          </div>
        `;
        grid.innerHTML += html;
      });
    } else {
      grid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1; color: var(--gold);">Belum ada buku yang ditambahkan.</p>';
    }
  </script>
</body>
</html>
